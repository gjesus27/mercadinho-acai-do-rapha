<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin - Mercadinho</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="image/logo/logoaçai.svg">
</head>

<body>

<header class="header">
  <h1>Painel Administrativo</h1>
  <button id="logoutAdmin" class="btn">Sair</button>
</header>

<!-- MENU LATERAL -->
<div class="sidebar" id="sidebarAdmin">
  <ul>
    <li data-sec="dashboard">Dashboard</li>
    <li data-sec="produtosSec">Produtos</li>
    <li data-sec="funcionariosSec">Funcionários</li>
    <li data-sec="relatoriosSec">Relatórios</li>
  </ul>
</div>

<div class="container">

  <!-- DASHBOARD -->
  <div id="dashboard" class="secaoAdmin"></div>

  <!-- PRODUTOS -->
  <div id="produtosSec" class="secaoAdmin" style="display:none">

    <h3>Adicionar Produto</h3>
    <input id="prodNome" class="input" placeholder="Nome">
    <input id="prodPreco" class="input" type="number" step="0.01" placeholder="Preço">
    <input id="prodImg" class="input" placeholder="URL imagem">
    <button id="btnAddProd" class="btn">Salvar</button>

    <hr>

    <h3>Produtos cadastrados</h3>
    <table class="table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Preço</th>
          <th>Ação</th>
        </tr>
      </thead>
      <tbody id="prodTable"></tbody>
    </table>

  </div>

  <!-- FUNCIONÁRIOS -->
  <div id="funcionariosSec" class="secaoAdmin" style="display:none">
    <h3>Funcionários</h3>
    <div id="funcionariosList"></div>
  </div>

  <!-- RELATÓRIOS -->
  <div id="relatoriosSec" class="secaoAdmin" style="display:none">
    <h3>Relatório de Vendas</h3>
    <table class="table">
      <thead>
        <tr>
          <th>Data</th>
          <th>Funcionário</th>
          <th>Itens</th>
          <th>Total</th>
        </tr>
      </thead>
      <tbody id="salesTable"></tbody>
    </table>
  </div>

</div>

<script type="module" src="script.js"></script>
</body>
</html>

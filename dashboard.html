<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard - Mercadinho do Rapha</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

  <!-- HEADER GLOBAL -->
  <header class="header">
    <img src="image/logo/logoaçai.svg" class="logo" alt="logo">
    <h1>Mercadinho do Rapha</h1>
    <button id="btnAdminToggle" class="btnAdmin">☰</button>

    <!-- BOX DO USUÁRIO LOGADO -->
    <div class="userBox">
      <span id="userNomeHeader">Nome</span>
      <img id="userFotoHeader" src="image/user.png" alt="Foto">
      <button id="logoutBtn" class="btnLogout">
        <img src="image/logout-icon.svg" alt="Sair">
      </button>
    </div>
  </header>

  <!-- MENU LATERAL ADMIN -->
  <div class="sidebar" id="menuAdmin">
    <h3>Menu Admin</h3>
    <button class="menuBtn ativo" data-pagina="dashboard.html">Dashboard</button>
    <button class="menuBtn" data-pagina="produtos.html">Produtos</button>
    <button class="menuBtn" data-pagina="funcionarios.html">Funcionários</button>
    <button class="menuBtn" data-pagina="relatorios.html">Relatórios</button>
    <button class="menuBtn" data-pagina="loja.html">Voltar à Loja</button>
  </div>

  <!-- CONTEÚDO PRINCIPAL -->
  <div class="conteudoAdmin">

    <h1>📊 Dashboard</h1>

    <!-- FILTROS -->
    <div class="row" style="margin-bottom:20px; gap:10px;">
      <select id="filtroFuncionario" class="input">
        <option value="todos">Todos Funcionários</option>
      </select>
      <select id="filtroPeriodo" class="input">
        <option value="todos">Todos os Períodos</option>
        <option value="hoje">Hoje</option>
        <option value="7dias">Últimos 7 dias</option>
        <option value="30dias">Últimos 30 dias</option>
      </select>
    </div>

    <!-- CARDS RESUMO -->
    <div class="dashboardCards row">
      <div class="cardAdmin col">
        <h3>Total Vendido</h3>
        <p id="totalVendido">R$ 0,00</p>
      </div>
      <div class="cardAdmin col">
        <h3>Total de Vendas</h3>
        <p id="totalVendas">0</p>
      </div>
      <div class="cardAdmin col">
        <h3>Ticket Médio</h3>
        <p id="ticketMedio">R$ 0,00</p>
      </div>
      <div class="cardAdmin col">
        <h3>Top Funcionário</h3>
        <p id="topFuncionario">-</p>
      </div>
      <div class="cardAdmin col">
        <h3>Total a Receber</h3>
        <p id="totalReceber">R$ 0,00</p>
      </div>
    </div>

    <!-- GRÁFICOS -->
    <div class="row">
      <div class="col">
        <canvas id="graficoVendas"></canvas>
      </div>
      <div class="col">
        <canvas id="graficoProdutos"></canvas>
      </div>
      <div class="col">
        <canvas id="graficoCashback"></canvas>
      </div>
    </div>

    <!-- RANKINGS -->
    <h2>Ranking Funcionários</h2>
    <div id="rankingFuncionarios" class="row"></div>

    <h2>Produtos Mais Vendidos</h2>
    <div id="rankingProdutos" class="row"></div>

  </div>

  <script type="module" src="dashboard.js"></script>
</body>
</html>

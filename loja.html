<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mercadinho do Rapha</title>
  <link rel="stylesheet" href="style.css">
    <link rel="icon" href="image/logo/logoaçai.svg">
</head>

<body>

<header class="header">

  <button id="btnAdminToggle" class="btnAdmin">☰</button>

  <img src="image/logo/logoaçai.svg" class="logo">
  <h1>Mercadinho do Rapha</h1>

  <div class="userBox">
    <img id="userFoto">
    <span id="userNome"></span>

    <button id="logoutBtn" class="btnLogout">
      🚪
    </button>
  </div>

</header>


<div id="menuAdmin" class="sidebar">
  <h3>Painel Administrador</h3>

  <button onclick="window.location.href='dashboard.html'">Dashboard</button>
  <button onclick="window.location.href='produtos.html'">Produtos</button>
  <button onclick="window.location.href='funcionarios.html'">Funcionários</button>
  <button onclick="window.location.href='relatorios.html'">Relatórios</button>
</div>

<div id="dashboard" class="secaoAdmin">
  <h2>📊 Dashboard</h2>
</div>

<div id="produtosAdmin" class="secaoAdmin">
  <h2>📦 Gestão de Produtos</h2>
</div>

<div id="funcionarios" class="secaoAdmin">
  <h2>👥 Funcionários</h2>
</div>

<div id="relatorios" class="secaoAdmin">
  <h2>📈 Relatórios</h2>
</div>


<div class="container" id="page-loja">

  <div class="row">

    <div class="col">
      <h3>Produtos Disponíveis</h3>
      <div class="produtos-grid" id="produtosGrid"></div>
    </div>

    <div style="width:320px">
      <div class="carrinho">

        <h3>Carrinho</h3>

        <div id="cartItems"></div>

        <div class="total">
          Total: R$ <span id="cartTotal">0.00</span>
        </div>

        <div class="pagamento" id="pagamentoArea" style="display:none;">

          <button class="btn" id="confirmarBtn">
            Confirmar Pagamento
          </button>

          <button class="btn" id="pagarDepoisBtn">
            Pagar Depois
          </button>

          <button class="btn" id="limparCarrinhoBtn">
            Limpar Carrinho
          </button>

        </div>

      </div>
    </div>

  </div>

</div>

<script type="module" src="script.js"></script>

</body>
</html>
